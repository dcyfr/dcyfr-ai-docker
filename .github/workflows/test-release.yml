name: Release (Test OIDC)

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        default: '@dcyfr/ai-docker'
        type: choice
        options:
          - '@dcyfr/ai-docker'

permissions:
  contents: write
  pull-requests: write
  id-token: write  # Required for OIDC authentication

env:
  NODE_VERSION: '24.13.0'
  NPM_CONFIG_PROVENANCE: true

jobs:
  test-release:
    name: Test OIDC Release
    runs-on: ubuntu-latest
    # No environment requirement - runs immediately
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js with npm registry
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      
      - name: Verify OIDC token availability
        run: |
          echo "🔍 Checking OIDC environment for Trusted Publisher:"
          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ] && [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "✅ OIDC token request environment available"
            echo "✅ Trusted Publisher authentication will be used"
          else
            echo "❌ OIDC environment not fully available"
            exit 1
          fi
      
      - name: Install dependencies
        run: |
          npm install
          npm install -D @changesets/cli @changesets/changelog-github
      
      - name: Process changeset and publish
        run: |
          echo "🧪 Processing changesets for OIDC test..."
          npx changeset version
          
          echo "📦 Current package.json version:"
          jq -r '.version' package.json
          
          echo "🚀 Publishing with OIDC authentication..."
          npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NODE_AUTH_TOKEN automatically set by setup-node for OIDC
          
      - name: Verify publication
        run: |
          echo "✅ Publication complete!"
          VERSION=$(jq -r '.version' package.json)
          echo "Published version: $VERSION"
          
          echo "🔐 Verifying provenance..."
          sleep 10  # Allow npm registry to process
          npm audit signatures @dcyfr/ai-docker@$VERSION || echo "Provenance check will be available shortly"